<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#eef2f6" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Table Trainer Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            background: #eef2f6;
            transition: background 0.4s ease;
        }

        #shell {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        #scroll {
            flex: 1;
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 16px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        .card-wrap {
            width: 100%;
            max-width: 24rem;
            padding: 1rem;
            flex-shrink: 0;
        }

        .game-card {
            min-height: unset;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            10%,
            30%,
            50%,
            70% {
                transform: translateX(-8px)
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(8px)
            }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-up {
            animation: fadeUp 0.25s ease both;
        }

        .paused-blur {
            filter: blur(4px) grayscale(.5);
            pointer-events: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #5b5cf2;
            border-radius: 10px
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent
        }

        /* ── GEAR ICON ─────────────────────────────────── */
        @keyframes gearSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .gear-btn {
            position: absolute;
            top: 1.4rem;
            right: 1.4rem;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            border-radius: 50%;
            z-index: 10;
        }

        .gear-btn:active {
            opacity: 0.6;
        }

        .gear-btn svg {
            animation: gearSpin 4s linear infinite;
        }

        /* ── MUSIC BUTTON ─────────────────────────────────── */
        .music-btn {
            position: absolute;
            top: 1.4rem;
            left: 1.4rem;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 50%;
            z-index: 10;
        }

        .music-btn:active {
            transform: scale(0.9);
        }

        .music-btn.playing {
            animation: musicPulse 1.5s ease-in-out infinite;
        }

        @keyframes musicPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        /* ── QUOTE OVERLAY ──────────────────────────────── */
        #quoteOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #quoteOverlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .quote-backdrop {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
        }

        .quote-backdrop.light {
            background: rgba(200, 210, 230, 0.82);
        }

        .quote-backdrop.dark {
            background: rgba(8, 15, 26, 0.78);
        }

        .quote-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 22rem;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 2.2rem;
            padding: 2rem 1.8rem 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: quoteIn 0.55s cubic-bezier(0.34, 1.38, 0.64, 1) both;
        }

        @keyframes quoteIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(24px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .quote-card.light {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(91, 92, 242, 0.18);
            box-shadow: 0 24px 60px rgba(91, 92, 242, 0.22), 0 8px 28px rgba(91, 92, 242, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .quote-card.dark {
            background: rgba(15, 23, 42, 0.68);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55), 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        /* Inline quote marks on the text itself */

        .quote-text {
            text-align: center;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.75;
            margin-bottom: 0;
            font-style: italic;
            letter-spacing: 0.01em;
            position: relative;
            padding: 0 0.2rem;
        }

        .quote-text.light {
            color: #1e293b;
        }

        .quote-text.dark {
            color: #e2e8f0;
        }

        /* Separator line between English and Hindi quotes */
        .quote-separator {
            width: 60%;
            height: 1.5px;
            margin: 1.2rem auto;
            border-radius: 2px;
        }

        .quote-separator.light {
            background: linear-gradient(90deg, transparent, rgba(91, 92, 242, 0.25), transparent);
        }

        .quote-separator.dark {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        .quote-hindi {
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.65;
            margin-top: 0;
            font-style: normal;
            letter-spacing: 0.01em;
            position: relative;
            padding: 0 0.2rem;
        }

        .quote-hindi.light {
            color: #334155;
        }

        .quote-hindi.dark {
            color: #cbd5e1;
        }

        /* Premium Proceed button */
        .proceed-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2.2rem;
            border-radius: 3rem;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .proceed-btn:active {
            transform: scale(0.93) !important;
        }

        .proceed-btn.light {
            background: linear-gradient(135deg, #5b5cf2 0%, #7c3aed 100%);
            color: #fff;
            box-shadow: 0 8px 28px rgba(91, 92, 242, 0.38), 0 2px 6px rgba(91, 92, 242, 0.18);
        }

        .proceed-btn.dark {
            background: linear-gradient(135deg, #b8960c 0%, #d4af37 60%, #f5d87c 100%);
            color: #0b111a;
            box-shadow: 0 8px 28px rgba(212, 175, 55, 0.3), 0 2px 6px rgba(212, 175, 55, 0.15);
        }

        .proceed-btn:hover {
            transform: translateY(-2px);
        }

        .proceed-btn:hover.light {
            box-shadow: 0 12px 36px rgba(91, 92, 242, 0.48);
        }

        .proceed-btn:hover.dark {
            box-shadow: 0 12px 36px rgba(212, 175, 55, 0.4);
        }

        /* ── SETTINGS PANEL inside overlay ──────────────── */
        .settings-panel {
            width: 100%;
            max-width: 22rem;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 2.2rem;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 1;
            animation: quoteIn 0.45s cubic-bezier(0.34, 1.38, 0.64, 1) both;
        }

        .settings-panel.light {
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.88);
            box-shadow: 0 32px 80px rgba(91, 92, 242, 0.14), 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .settings-panel.dark {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
        }

        /* iOS-style toggle */
        .toggle-track {
            position: relative;
            width: 3rem;
            height: 1.65rem;
            border-radius: 9999px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.25s ease;
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toggle-track.on .toggle-thumb {
            transform: translateX(1.35rem);
        }

        .toggle-track.on {
            background: #5b5cf2;
        }

        .toggle-track.off {
            background: #94a3b8;
        }

        .toggle-track.on.dark-gold {
            background: #d4af37;
        }

        /* Settings quote text — same inline mark style */
        .sq-quote-text {
            font-size: 0.83rem;
            font-weight: 700;
            line-height: 1.65;
            font-style: italic;
            margin: 0;
        }

        .sq-light {
            color: #1e293b;
        }

        .sq-dark {
            color: #cbd5e1;
        }

        /* Settings close X */
        .settings-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        /* Quotation Marks Styling */
        .quote-content {
            position: relative;
            display: inline-block;
        }

        .quote-mark {
            font-family: serif;
            font-size: 1.8rem;
            line-height: 0;
            vertical-align: middle;
            display: inline-block;
            opacity: 0.4;
            /* Thoda transparent image ki tarah */
            margin: 0 4px;
        }

        .quote-mark.light {
            color: #5b5cf2;
        }

        .quote-mark.dark {
            color: #d4af37;
        }
    </style>
</head>

<body>

    <!-- ── QUOTE OVERLAY ─────────────────────────────────────────────────────── -->
    <div id="quoteOverlay">
        <div class="quote-backdrop light" id="quoteBackdrop"></div>
        <!-- Quote view -->
        <div id="quoteView" class="quote-card light" style="display:flex">
            <!-- Music Button inside card -->
            <div class="music-btn" onclick="toggleMusic()">
                <div id="quote-music-icon"></div>
            </div>
            <p class="quote-text light" id="quoteText">Loading…</p>
            <button class="proceed-btn light" id="proceedBtn" onclick="closeQuoteOverlay()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m5 12 14 0" />
                    <path d="m13 6 6 6-6 6" />
                </svg>
                Proceed
            </button>
        </div>
        <!-- Settings view -->
        <div id="settingsView" class="settings-panel light" style="display:none">
            <button class="settings-close" id="settingsClose" onclick="closeSettingsPanel()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M18 6 6 18M6 6l12 12" />
                </svg>
            </button>
            <p style="font-size:0.65rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;opacity:0.45;margin-bottom:1.4rem"
                id="settingsLabel">Settings</p>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.4rem">
                <div>
                    <p style="font-size:0.92rem;font-weight:700;margin:0 0 0.18rem" id="toggleLabel">Disable Quotes</p>
                    <p style="font-size:0.72rem;opacity:0.45;margin:0;font-weight:500" id="toggleSub">Hide the daily
                        quote on startup</p>
                </div>
                <div class="toggle-track off" id="disableToggle" onclick="toggleDisableQuotes()">
                    <div class="toggle-thumb"></div>
                </div>
            </div>

            <!-- Quote preview — shows/hides with toggle -->
            <div id="settingsQuoteBox"
                style="border-radius:1.2rem;padding:1rem 1.1rem;transition:opacity 0.35s ease,transform 0.35s ease,max-height 0.35s ease;">
                <p style="font-size:0.58rem;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;opacity:0.38;margin:0 0 0.6rem"
                    id="sqLabel">Today's Quote</p>
                <p class="sq-quote-text" id="settingsQuoteText"></p>
            </div>
        </div>
    </div>
    <!-- Hidden audio element for background music -->
    <audio id="bgMusic" loop>
        <source src="vers.mp3" type="audio/mpeg">
    </audio>
    <div id="shell">
        <div id="scroll"></div>
    </div>

    <script>
        // ── SERVICE WORKER ─────────────────────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            const sw = `const C='tt-v2';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })));
        }

        // ── ICONS ──────────────────────────────────────────────────────────────────
        const I = {
            sun: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="19.78" y1="4.22" x2="17.66" y2="6.34"/><line x1="6.34" y1="17.66" x2="4.22" y2="19.78"/></svg>`,
            moon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`,
            back: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
            pause: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
            play: `<svg width="48" height="48" viewBox="0 0 24 24" fill="#5b5cf2" stroke="#5b5cf2" stroke-width="2"><path d="m5 3 14 9-14 9V3z"/></svg>`,
            close: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
            check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M20 6 9 17l-5-5"/></svg>`,
            retry: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            x: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
            gear: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>`,
            // gear:`<svg width="18" height="18"...></svg>`,
            speaker: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
  </svg>`,
            speakerOff: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>`
        };


        // ── ADAPTIVE DARK MODE ─────────────────────────────────────────────────────
        // Initialise from system preference; manual toggle overrides from here on
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        let userOverride = false;
        let dark = mq.matches;
        mq.addEventListener('change', e => { if (!userOverride) { dark = e.matches; applyDarkMode(); paint(); } });

        function manualToggleDark() { userOverride = true; dark = !dark; paint(); }

        function applyDarkMode() {
            const bg = dark ? '#0b111a' : '#eef2f6';
            document.body.style.background = bg;
            const shell = document.getElementById('shell');
            const scroll = document.getElementById('scroll');
            if (shell) shell.style.background = bg;
            if (scroll) scroll.style.background = bg;
            document.getElementById('themeColorMeta').setAttribute('content', bg);
            // Update overlay theme
            applyOverlayTheme();
        }

        function applyOverlayTheme() {
            const mode = dark ? 'dark' : 'light';
            const anti = dark ? 'light' : 'dark';
            const bd = document.getElementById('quoteBackdrop');
            const qv = document.getElementById('quoteView');
            const sv = document.getElementById('settingsView');
            const qm = null; // quote marks now CSS ::before/::after
            const qt = document.getElementById('quoteText');
            const pb = document.getElementById('proceedBtn');
            const sc = document.getElementById('settingsClose');
            const sl = document.getElementById('settingsLabel');
            const tl = document.getElementById('toggleLabel');
            const ts = document.getElementById('toggleSub');
            if (!bd) return;
            bd.className = `quote-backdrop ${mode}`;
            qv.className = `quote-card ${mode}`;
            sv.className = `settings-panel ${mode}`;
            // qm handled via CSS
            qt.className = `quote-text ${mode}`;
            pb.className = `proceed-btn ${mode}`;
            // closing mark handled via CSS
            if (dark) {
                sc.style.background = 'rgba(148,163,184,0.1)';
                sc.style.color = '#94a3b8';
                sl.style.color = '#94a3b8';
                tl.style.color = '#e2e8f0';
                ts.style.color = '#64748b';
            } else {
                sc.style.background = 'rgba(100,116,139,0.08)';
                sc.style.color = '#64748b';
                sl.style.color = '#64748b';
                tl.style.color = '#1e293b';
                ts.style.color = '#94a3b8';
            }
            // toggle gold in dark
            const tog = document.getElementById('disableToggle');
            if (tog) {
                if (dark && tog.classList.contains('on')) {
                    tog.classList.add('dark-gold');
                } else {
                    tog.classList.remove('dark-gold');
                }
            }
            // Style the settings quote box
            const sqb = document.getElementById('settingsQuoteBox');
            const sqt = document.getElementById('settingsQuoteText');
            const sql = document.getElementById('sqLabel');
            if (sqb) {
                sqb.style.background = dark ? 'rgba(255,255,255,0.04)' : 'rgba(91,92,242,0.05)';
                sqb.style.border = dark ? '1px solid rgba(148,163,184,0.1)' : '1px solid rgba(91,92,242,0.1)';
            }
            if (sqt) {

        // Returns today's fallback quote based on day-of-year (feels fresh daily, no API needed)
        function getTodayFallback() {
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            return FALLBACK_QUOTES[dayOfYear % FALLBACK_QUOTES.length];
        }

        function getQuotesDisabled() {
            return localStorage.getItem('ttp_quotes_disabled') === '1';
        }
        function setQuotesDisabled(val) {
            localStorage.setItem('ttp_quotes_disabled', val ? '1' : '0');
        }
        function getStoredQuote() {
            try {
                const s = localStorage.getItem('ttp_daily_quote');
                return s ? JSON.parse(s) : null;
            } catch (e) { return null; }
        }
        function storeQuote(text) {
            localStorage.setItem('ttp_daily_quote', JSON.stringify({ text, ts: Date.now() }));
        }

        function isFetchWindow() {
            const stored = getStoredQuote();
            if (!stored) return true;
            const now = new Date();
            const today4am = new Date(now);
            today4am.setHours(4, 0, 0, 0);
            if (stored.ts >= today4am.getTime()) return false;
            return now >= today4am;
        }

        async function fetchDailyQuote() {
            // Reuse cached quote if still fresh for today
            if (!isFetchWindow()) {
                const stored = getStoredQuote();
                if (stored) return stored.text;
            }
            // Curated set — rotates by calendar day, always unique, never generic
            const quote = getTodayFallback();
            storeQuote(quote);
            return quote;
        }

        // ── AUDIO ──────────────────────────────────────────────────────────────────
        function beep(ok) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if (ok) {
                    o.type = 'sine';
                    o.frequency.setValueAtTime(600, audioCtx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
                    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    o.start(); o.stop(audioCtx.currentTime + 0.15);
                } else {
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(150, audioCtx.currentTime);
                    o.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    o.start(); o.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) { }
        }

                scroll.innerHTML = resultHTML();

            }

        // Surgical game update — never touches the input, never dismisses keyboard

            const dm = dark;
            // Shake border
            const card = document.getElementById('game-card');
            if (card) {
                card.className = card.className
                    .replace(/shake|border-rose-500\/50|border-transparent/g, '').trim();
                if (shaking) {
                    card.classList.add('shake', 'border-rose-500/50');
                } else {
                    card.classList.add('border-transparent');

            // Pause overlay
            const pauseOverlay = document.getElementById('pause-overlay');
            const mainContent = document.getElementById('game-content');
            if (pauseOverlay) pauseOverlay.style.display = paused ? 'flex' : 'none';
            if (mainContent) mainContent.className = mainContent.className
                .replace(/paused-blur/g, '').trim() + (paused ? ' paused-blur' : '');
            // Question text
            const qEl = document.getElementById('game-question');
            if (qEl) qEl.textContent = qd.a + ' × ' + qd.b;
            // Progress bar
            const tot = parseInt(cfg.questions) || 5;
            const pb = document.getElementById('progress-bar');
            if (pb) pb.style.width = ((gs.q / tot) * 100) + '%';
            // Question counter
            const qc = document.getElementById('question-counter');
            if (qc) qc.textContent = 'Q ' + gs.q + ' / ' + tot;
            // Answer input value only if empty (new question), then re-focus
            const gi = document.getElementById('gi');
            if (gi && ans === '') {
                gi.value = '';
                setTimeout(() => gi.focus(), 50);
            }
        }

    if (!startVal) {

        return; 
    }

    // --- ACCURATE LOCAL DATE LOGIC ---
    const sp = startVal.split('-');
    // Date(year, monthIndex, day) use karne se hamesha local time milta hai
    const start = new Date(sp[0], sp[1] - 1, sp[2]);
    start.setHours(0, 0, 0, 0); // Start date ki bilkul shuruat (Midnight)

    const today = new Date();
    today.setHours(0, 0, 0, 0); // Aaj ki shuruat (Midnight)

    // Diff nikalne ke liye milliseconds ko days mein convert karein
    const diffTime = today - start;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays < 0) {
        el.textContent = `Starts in ${Math.abs(diffDays)} days ⏳`;
    } else if (diffDays === 0) {
        el.textContent = 'Day 1: Journey starts today! 🚀';
    } else {
        el.textContent = `${diffDays} days have passed since start`;
    }
}

            let daysLeft = 0;

                destDate.setHours(23, 59, 59, 999);

                const now = new Date(); // Current live time (e.g., 7:15 PM)

                // 2. Milliseconds ka difference nikaalein
                const diffMs = destDate - now;

                // Milliseconds difference ko pure din mein badlo
                const diffDays = diffMs / (1000 * 60 * 60 * 24);

                // Agar diff 1 se kam hai (yaani aaj ka din bacha hai), toh 0 din left (kyunki aaj hi goal hai)
                // Agar aap chahte hain ki "Kal" ke liye 1 dikhaye, toh floor use karein

         // --- updateCDWidget ke andar ka INNER HTML replace karein ---

        function startGame(retry = false) {
            if (!retry) {
                const invalid =
                    (!cfg.time || !cfg.questions) ||
                    (cfg.mode === 'fixed' && !cfg.table) ||
                    (cfg.mode === 'shuffle' && (!cfg.from || !cfg.to));

                if (invalid) {
                    const inputs = document.querySelectorAll('input[type="number"]');
                    inputs.forEach(inp => {
                        if (!inp.value) inp.style.borderColor = '#ef4444';
                    });
                    const btn = document.getElementById('start-btn');
                    if (btn) {
                        btn.style.background = '#ef4444';
                        btn.innerText = 'Fill all fields!';
                        setTimeout(() => {
                            btn.style.background = '#5b5cf2';
                            btn.innerText = 'START';
                        }, 1500);
                    }
                    return;
                }
            }
            gs = { q: 1, score: 0, wrong: 0, history: [], totalTime: 0 };
            qHistory = [];
            screen = 'game';
            nextQ();
        }

        // ── NEXT QUESTION with History Buffer ─────────────────────────────────────
        function nextQ() {
            let a, b, key;
            const maxAttempts = 60;
            let attempts = 0;

            do {
                if (cfg.mode === 'fixed') {
                    a = parseInt(cfg.table) || 1;
                } else {
                    const mn = Math.min(parseInt(cfg.from) || 1, parseInt(cfg.to) || 10);
                    const mx = Math.max(parseInt(cfg.from) || 1, parseInt(cfg.to) || 10);
                    a = Math.floor(Math.random() * (mx - mn + 1)) + mn;
                }
                b = Math.floor(Math.random() * 12) + 1;
                key = `${a}×${b}`;
                attempts++;
                // If we've exhausted attempts (very small question pool), just accept any
                if (attempts >= maxAttempts) break;
            } while (qHistory.includes(key));

            // Add to buffer, trim to last Q_BUF_SIZE
            qHistory.push(key);
            if (qHistory.length > Q_BUF_SIZE) qHistory.shift();

            qd = { a, b, ans: a * b };
            timeLeft = parseFloat(cfg.time) || 5;
            qStart = Date.now();
            ans = '';
            paused = false;
            shaking = false;
            startTimer();
            // If game card already exists, patch surgically (keyboard stays open)
            // Otherwise full render (first question)
            if (document.getElementById('game-card')) {
                patchGame();
            } else {
                paint();
            }
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                if (paused || shaking) return;
                timeLeft = Math.round((timeLeft - 0.1) * 10) / 10;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timer);
                    doSubmit(false, true);
                    return;
                }
                const tt = document.getElementById('tt');
                const tc = document.getElementById('tc');
                if (tt) tt.innerText = timeLeft.toFixed(1);
                if (tc) {
                    const lim = parseFloat(cfg.time) || 5;
                    tc.setAttribute('stroke-dashoffset', Math.max(0, 125.6 - (timeLeft / lim) * 125.6));
                }
            }, 100);
        }

        function doSubmit(ok, timedOut = false) {
            if (shaking) return;
            if (ok) {
                beep(true);
                advance(true, timedOut);
            } else {
                beep(false);
                shaking = true;
                // Add shake class directly — no paint(), keyboard stays open
                const card = document.getElementById('game-card');
                if (card) {
                    card.classList.add('shake');
                    card.classList.remove('border-transparent');
                    card.classList.add('border-2', 'border-rose-500/50');
                    setTimeout(() => {
                        card.classList.remove('shake', 'border-rose-500/50');
                        card.classList.add('border-transparent');
                        advance(false, timedOut);
                    }, 400);
                } else {
                    setTimeout(() => advance(false, timedOut), 400);
                }
            }
        }

        function advance(ok, timedOut) {
            const lim = parseFloat(cfg.time) || 5;
            const t = Math.min((Date.now() - qStart) / 1000, lim).toFixed(1);
            gs.history.push({ q: `${qd.a} × ${qd.b}`, ok, t: t + 's', ua: timedOut ? 'time' : (ans || '?'), ca: qd.ans });
            if (ok) gs.score++; else gs.wrong++;
            const tot = parseInt(cfg.questions) || 5;
            if (gs.q >= tot) {
                gs.totalTime = gs.history.reduce((s, h) => s + parseFloat(h.t), 0).toFixed(1);
                screen = 'result';
                clearInterval(timer);
                paint();
            } else {
                gs.q++;
                nextQ();
            }
        }

        function doPause() {
            paused = true;
            clearInterval(timer);
            const po = document.getElementById('pause-overlay');
            const gc = document.getElementById('game-content');
            if (po) po.style.display = 'flex';
            if (gc) gc.classList.add('paused-blur');
        }
        function doUnpause() {
            paused = false;
            const po = document.getElementById('pause-overlay');
            const gc = document.getElementById('game-content');
            if (po) po.style.display = 'none';
            if (gc) gc.classList.remove('paused-blur');
            startTimer();
            // Refocus input after unpause
            setTimeout(() => { const el = document.getElementById('gi'); if (el) el.focus(); }, 100);
        }
        function exitGame() { screen = 'setup'; clearInterval(timer); paint(); }

        // ── BOOT ───────────────────────────────────────────────────────────────────
        applyDarkMode();
        paint();
        initQuoteOverlay();
    </script>

    <!-- ── COUNTDOWN POPUP ─────────────────────────────────────────────────── -->
    <div id="cd-popup-overlay" onclick="closeCDPopup()" style="

">

    " id="cd-popup-card">

            <!-- Title -->
            <div style="text-align:center;">
                <p style="font-size:0.9rem;font-weight:900;letter-spacing:0.10em;text-transform:uppercase;opacity:0.45;margin:0 0 0.3rem"

            <div>

                    style="font-size:0.65rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;"

                <input type="date" id="cd-start-input" oninput="updateCDPassedDays()" style="
                width:100%;
                margin-top:0.4rem;
                padding:0.65rem 1rem;
                border-radius:0.9rem;
                border:2px solid rgba(91,92,242,0.2);
                font-size:0.9rem;
                font-weight:700;
                outline:none;
                font-family:inherit;
                background:transparent;

            <!-- Destination Date -->
            <div>
                <label
                    style="font-size:0.65rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;"
                    id="cd-label-dest">Goal / Destination Date</label>
                <input type="date" id="cd-dest-input" style="
                width:100%;
                margin-top:0.4rem;
                padding:0.65rem 1rem;
                border-radius:0.9rem;
                border:2px solid rgba(91,92,242,0.2);
                font-size:0.9rem;
                font-weight:700;
                outline:none;
                font-family:inherit;
                background:transparent;
            ">
            </div>

            <!-- Days passed card -->
            <div style="
            border-radius:1rem;
            padding:0.7rem 1rem;
            background:rgba(91,92,242,0.08);
            border:1px solid rgba(91,92,242,0.15);
            text-align:center;
        ">
                <span style="font-size:0.75rem;font-weight:800;color:#5b5cf2;" id="cd-passed-days">— days has
                    passed</span>
            </div>

            <!-- Buttons -->
            <button onclick="saveCDJourney()" style="
            width:100%;
            padding:0.8rem;
            border-radius:1.2rem;
            background:linear-gradient(135deg,#5b5cf2,#7c3aed);
            color:#fff;
            font-size:0.9rem;
            font-weight:900;
            border:none;
            cursor:pointer;
            letter-spacing:0.05em;
            box-shadow:0 8px 24px rgba(91,92,242,0.35);
        ">Save Journey ✨</button>

            <button onclick="closeCDPopup()" style="
            width:100%;
            padding:0.7rem;
            border-radius:1.2rem;
            background:transparent;
            font-size:0.85rem;
            font-weight:700;
            border:2px solid rgba(100,116,139,0.2);
            cursor:pointer;
            opacity:0.6;
            font-family:inherit;
        " id="cd-cancel-btn">Cancel</button>
            <!-- New Year Counter -->
            <div style="
    border-radius:1rem;
    padding:0.7rem 1rem;
    background:linear-gradient(135deg,rgba(91,92,242,0.08),rgba(124,58,237,0.08));
    border:1px solid rgba(91,92,242,0.15);
    text-align:center;
">
                <div style="font-size:0.78rem;font-weight:900;color:#5b5cf2;letter-spacing:0.04em;">New Year will be
                    YOURS! 🎯</div>
                <div style="font-size:0.68rem;font-weight:700;color:#64748b;margin-top:0.2rem;" id="cd-ny-days"></div>
            </div>

        </div>
    </div>
</body>
