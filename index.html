<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#eef2f6" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Table Trainer Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            background: #eef2f6;
            transition: background 0.4s ease;
        }

        #shell {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }
        #scroll {
            flex: 1;
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 16px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }
        .card-wrap {
            width: 100%;
            max-width: 24rem;
            padding: 1rem;
            flex-shrink: 0;
        }

        .game-card {
            min-height: calc(100vh - 2rem);
            min-height: calc(100dvh - 2rem);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes shake {
            0%,100%{transform:translateX(0)}
            10%,30%,50%,70%{transform:translateX(-8px)}
            20%,40%,60%,80%{transform:translateX(8px)}
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes fadeUp {
            from{opacity:0;transform:translateY(16px)}
            to{opacity:1;transform:translateY(0)}
        }
        .fade-up { animation: fadeUp 0.25s ease both; }

        .paused-blur { filter: blur(4px) grayscale(.5); pointer-events: none; }

        .custom-scrollbar::-webkit-scrollbar{width:4px}
        .custom-scrollbar::-webkit-scrollbar-thumb{background:#5b5cf2;border-radius:10px}
        .custom-scrollbar::-webkit-scrollbar-track{background:transparent}

        /* ── GEAR ICON ─────────────────────────────────── */
        @keyframes gearSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .gear-btn {
            position: absolute;
            top: 1.4rem;
            right: 1.4rem;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            border-radius: 50%;
            z-index: 10;
        }
        .gear-btn:active { opacity: 0.6; }
        .gear-btn svg {
            transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }
        .gear-btn:hover svg {
            animation: gearSpin 1.2s linear infinite;
        }

        /* ── QUOTE OVERLAY ──────────────────────────────── */
        #quoteOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #quoteOverlay.visible {
            opacity: 1;
            pointer-events: all;
        }
        .quote-backdrop {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
        }
        .quote-backdrop.light { background: rgba(238,242,246,0.72); }
        .quote-backdrop.dark  { background: rgba(8,15,26,0.78); }

        .quote-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 22rem;
            border-radius: 2.2rem;
            padding: 2.4rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: quoteIn 0.55s cubic-bezier(0.34,1.38,0.64,1) both;
        }
        @keyframes quoteIn {
            from { opacity:0; transform: scale(0.85) translateY(24px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .quote-card.light {
            background: rgba(255,255,255,0.62);
            border: 1px solid rgba(255,255,255,0.85);
            box-shadow: 0 32px 80px rgba(91,92,242,0.14), 0 8px 24px rgba(0,0,0,0.08);
        }
        .quote-card.dark {
            background: rgba(15,23,42,0.68);
            border: 1px solid rgba(148,163,184,0.12);
            box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 8px 24px rgba(0,0,0,0.4);
        }

        /* Decorative quote mark */
        .quote-mark {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: -0.5rem;
            font-family: Georgia, serif;
        }
        .quote-mark.light { color: rgba(91,92,242,0.18); }
        .quote-mark.dark  { color: rgba(212,175,55,0.22); }

        .quote-text {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.65;
            margin-bottom: 2rem;
        }
        .quote-text.light { color: #1e293b; }
        .quote-text.dark  { color: #e2e8f0; }

        /* Premium Proceed button */
        .proceed-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2.2rem;
            border-radius: 3rem;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .proceed-btn:active { transform: scale(0.93) !important; }
        .proceed-btn.light {
            background: linear-gradient(135deg, #5b5cf2 0%, #7c3aed 100%);
            color: #fff;
            box-shadow: 0 8px 28px rgba(91,92,242,0.38), 0 2px 6px rgba(91,92,242,0.18);
        }
        .proceed-btn.dark {
            background: linear-gradient(135deg, #b8960c 0%, #d4af37 60%, #f5d87c 100%);
            color: #0b111a;
            box-shadow: 0 8px 28px rgba(212,175,55,0.3), 0 2px 6px rgba(212,175,55,0.15);
        }
        .proceed-btn:hover {
            transform: translateY(-2px);
        }
        .proceed-btn:hover.light { box-shadow: 0 12px 36px rgba(91,92,242,0.48); }
        .proceed-btn:hover.dark  { box-shadow: 0 12px 36px rgba(212,175,55,0.4); }

        /* ── SETTINGS PANEL inside overlay ──────────────── */
        .settings-panel {
            width: 100%;
            max-width: 22rem;
            border-radius: 2.2rem;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 1;
            animation: quoteIn 0.45s cubic-bezier(0.34,1.38,0.64,1) both;
        }
        .settings-panel.light {
            background: rgba(255,255,255,0.68);
            border: 1px solid rgba(255,255,255,0.88);
            box-shadow: 0 32px 80px rgba(91,92,242,0.14), 0 8px 24px rgba(0,0,0,0.08);
        }
        .settings-panel.dark {
            background: rgba(15,23,42,0.78);
            border: 1px solid rgba(148,163,184,0.12);
            box-shadow: 0 32px 80px rgba(0,0,0,0.55);
        }

        /* iOS-style toggle */
        .toggle-track {
            position: relative;
            width: 3rem;
            height: 1.65rem;
            border-radius: 9999px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.25s ease;
        }
        .toggle-thumb {
            position: absolute;
            top: 3px; left: 3px;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .toggle-track.on .toggle-thumb  { transform: translateX(1.35rem); }
        .toggle-track.on  { background: #5b5cf2; }
        .toggle-track.off { background: #94a3b8; }
        .toggle-track.on.dark-gold { background: #d4af37; }

        /* Settings close X */
        .settings-close {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 2rem; height: 2rem;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
    </style>
</head>
<body>

<!-- ── QUOTE OVERLAY ─────────────────────────────────────────────────────── -->
<div id="quoteOverlay">
    <div class="quote-backdrop light" id="quoteBackdrop"></div>
    <!-- Quote view -->
    <div id="quoteView" class="quote-card light" style="display:flex">
        <div class="quote-mark light" id="quoteMark">"</div>
        <p class="quote-text light" id="quoteText">Loading…</p>
        <button class="proceed-btn light" id="proceedBtn" onclick="closeQuoteOverlay()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 14 0"/><path d="m13 6 6 6-6 6"/></svg>
            Proceed
        </button>
    </div>
    <!-- Settings view -->
    <div id="settingsView" class="settings-panel light" style="display:none">
        <button class="settings-close" id="settingsClose" onclick="closeSettingsPanel()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <p style="font-size:0.65rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;opacity:0.45;margin-bottom:1.4rem" id="settingsLabel">Settings</p>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem">
            <div>
                <p style="font-size:0.92rem;font-weight:700;margin:0 0 0.18rem" id="toggleLabel">Disable Quotes</p>
                <p style="font-size:0.72rem;opacity:0.45;margin:0;font-weight:500" id="toggleSub">Hide the daily quote on startup</p>
            </div>
            <div class="toggle-track off" id="disableToggle" onclick="toggleDisableQuotes()">
                <div class="toggle-thumb"></div>
            </div>
        </div>
    </div>
</div>

<div id="shell">
  <div id="scroll"></div>
</div>

<script>
// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    const sw = `const C='tt-v2';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
}

// ── ICONS ──────────────────────────────────────────────────────────────────
const I = {
    sun:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="19.78" y1="4.22" x2="17.66" y2="6.34"/><line x1="6.34" y1="17.66" x2="4.22" y2="19.78"/></svg>`,
    moon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`,
    back:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
    pause:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
    play:`<svg width="48" height="48" viewBox="0 0 24 24" fill="#5b5cf2" stroke="#5b5cf2" stroke-width="2"><path d="m5 3 14 9-14 9V3z"/></svg>`,
    close:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
    check:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M20 6 9 17l-5-5"/></svg>`,
    retry:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
    x:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
    gear:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>`
};

// ── ADAPTIVE DARK MODE ─────────────────────────────────────────────────────
// Initialise from system preference; manual toggle overrides from here on
const mq = window.matchMedia('(prefers-color-scheme: dark)');
let dark = mq.matches;

function applyDarkMode() {
    const bg = dark ? '#0b111a' : '#eef2f6';
    document.body.style.background = bg;
    const shell = document.getElementById('shell');
    const scroll = document.getElementById('scroll');
    if (shell) shell.style.background = bg;
    if (scroll) scroll.style.background = bg;
    document.getElementById('themeColorMeta').setAttribute('content', bg);
    // Update overlay theme
    applyOverlayTheme();
}

function applyOverlayTheme() {
    const mode = dark ? 'dark' : 'light';
    const anti = dark ? 'light' : 'dark';
    const bd = document.getElementById('quoteBackdrop');
    const qv = document.getElementById('quoteView');
    const sv = document.getElementById('settingsView');
    const qm = document.getElementById('quoteMark');
    const qt = document.getElementById('quoteText');
    const pb = document.getElementById('proceedBtn');
    const sc = document.getElementById('settingsClose');
    const sl = document.getElementById('settingsLabel');
    const tl = document.getElementById('toggleLabel');
    const ts = document.getElementById('toggleSub');
    if (!bd) return;
    bd.className = `quote-backdrop ${mode}`;
    qv.className = `quote-card ${mode}`;
    sv.className = `settings-panel ${mode}`;
    qm.className = `quote-mark ${mode}`;
    qt.className = `quote-text ${mode}`;
    pb.className = `proceed-btn ${mode}`;
    if (dark) {
        sc.style.background = 'rgba(148,163,184,0.1)';
        sc.style.color = '#94a3b8';
        sl.style.color = '#94a3b8';
        tl.style.color = '#e2e8f0';
        ts.style.color = '#64748b';
    } else {
        sc.style.background = 'rgba(100,116,139,0.08)';
        sc.style.color = '#64748b';
        sl.style.color = '#64748b';
        tl.style.color = '#1e293b';
        ts.style.color = '#94a3b8';
    }
    // toggle gold in dark
    const tog = document.getElementById('disableToggle');
    if (tog) {
        if (dark && tog.classList.contains('on')) {
            tog.classList.add('dark-gold');
        } else {
            tog.classList.remove('dark-gold');
        }
    }
}

// ── STATE ──────────────────────────────────────────────────────────────────
let screen = 'setup';
let paused = false, shaking = false;
let cfg  = { time:'', questions:'', mode:'fixed', table:'', from:'', to:'' };
let gs   = { q:1, score:0, wrong:0, history:[], totalTime:0 };
let qd   = { a:0, b:0, ans:0 };
let ans  = '';
let timeLeft = 0, qStart = 0;
let timer = null;
let audioCtx = null;

// Question history buffer (last 12)
const Q_BUF_SIZE = 12;
let qHistory = [];

// ── QUOTE SYSTEM ───────────────────────────────────────────────────────────
const FALLBACK_QUOTES = [
    'Stop thinking about it—do it.',
    'Your biggest enemy is your uncontrolled mind.',
    'Reality hits harder than you expect.'
];

function getQuotesDisabled() {
    return localStorage.getItem('ttp_quotes_disabled') === '1';
}
function setQuotesDisabled(val) {
    localStorage.setItem('ttp_quotes_disabled', val ? '1' : '0');
}
function getStoredQuote() {
    try {
        const s = localStorage.getItem('ttp_daily_quote');
        return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
}
function storeQuote(text) {
    localStorage.setItem('ttp_daily_quote', JSON.stringify({ text, ts: Date.now() }));
}

function isFetchWindow() {
    // Returns true if current time is past 4:00 AM today and quote not yet fetched today
    const stored = getStoredQuote();
    if (!stored) return true;
    const now = new Date();
    const today4am = new Date(now);
    today4am.setHours(4, 0, 0, 0);
    // If stored was fetched after today's 4am, we're good — reuse it
    if (stored.ts >= today4am.getTime()) return false;
    // Otherwise fetch fresh if it's past 4am
    return now >= today4am;
}

async function fetchDailyQuote() {
    if (!isFetchWindow()) {
        const stored = getStoredQuote();
        if (stored) return stored.text;
    }
    try {
        const res = await fetch('https://api.quotable.io/random?maxLength=120', { signal: AbortSignal.timeout(4000) });
        if (!res.ok) throw new Error('api fail');
        const data = await res.json();
        const text = data.content || '';
        if (text) { storeQuote(text); return text; }
    } catch(e) {}
    // Fallback
    return FALLBACK_QUOTES[Math.floor(Math.random() * FALLBACK_QUOTES.length)];
}

async function initQuoteOverlay() {
    if (getQuotesDisabled()) return;
    const overlay = document.getElementById('quoteOverlay');
    const qt = document.getElementById('quoteText');
    showQuoteView();
    overlay.classList.add('visible');
    applyOverlayTheme();
    const text = await fetchDailyQuote();
    if (qt) qt.textContent = text;
}

function closeQuoteOverlay() {
    const overlay = document.getElementById('quoteOverlay');
    overlay.classList.remove('visible');
}

function showQuoteView() {
    document.getElementById('quoteView').style.display = 'flex';
    document.getElementById('settingsView').style.display = 'none';
}

function openSettingsPanel() {
    const overlay = document.getElementById('quoteOverlay');
    document.getElementById('quoteView').style.display = 'none';
    document.getElementById('settingsView').style.display = 'block';
    overlay.classList.add('visible');
    applyOverlayTheme();
    syncToggle();
}

function closeSettingsPanel() {
    document.getElementById('quoteOverlay').classList.remove('visible');
}

function syncToggle() {
    const tog = document.getElementById('disableToggle');
    if (!tog) return;
    const disabled = getQuotesDisabled();
    if (disabled) {
        tog.classList.add('on'); tog.classList.remove('off');
        if (dark) tog.classList.add('dark-gold');
    } else {
        tog.classList.remove('on', 'dark-gold'); tog.classList.add('off');
    }
}

function toggleDisableQuotes() {
    const cur = getQuotesDisabled();
    setQuotesDisabled(!cur);
    syncToggle();
    if (dark) {
        const tog = document.getElementById('disableToggle');
        if (tog && tog.classList.contains('on')) tog.classList.add('dark-gold');
        else if (tog) tog.classList.remove('dark-gold');
    }
}

// ── AUDIO ──────────────────────────────────────────────────────────────────
function beep(ok) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if (audioCtx.state==='suspended') audioCtx.resume();
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        if (ok) {
            o.type='sine';
            o.frequency.setValueAtTime(600,audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(900,audioCtx.currentTime+0.1);
            g.gain.setValueAtTime(0.2,audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);
            o.start(); o.stop(audioCtx.currentTime+0.15);
        } else {
            o.type='triangle';
            o.frequency.setValueAtTime(150,audioCtx.currentTime);
            o.frequency.linearRampToValueAtTime(50,audioCtx.currentTime+0.2);
            g.gain.setValueAtTime(0.3,audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.25);
            o.start(); o.stop(audioCtx.currentTime+0.25);
        }
    } catch(e) {}
}

// ── PAINT ──────────────────────────────────────────────────────────────────
function paint() {
    applyDarkMode();
    const scroll = document.getElementById('scroll');
    if (screen==='setup')  scroll.innerHTML = setupHTML();
    if (screen==='game')   scroll.innerHTML = gameHTML();
    if (screen==='result') scroll.innerHTML = resultHTML();
    scroll.scrollTop = 0;
    if (screen==='game' && !paused && !shaking) {
        requestAnimationFrame(() => { const el=document.getElementById('gi'); if(el) el.focus(); });
    }
}

// ── SETUP ──────────────────────────────────────────────────────────────────

// ── GAME ───────────────────────────────────────────────────────────────────

    const tot = parseInt(cfg.questions)||5;

    <div class="card-wrap fade-up">
      <div class="game-card relative flex flex-col items-center w-full p-8 rounded-[3rem] shadow-2xl
        ${shaking?'shake border-2 border-rose-500/50':'border-2 border-transparent'}
        ${dm?'bg-[#0f172a] text-white':'bg-[#f8faff] text-slate-800'}">

        ${paused?`
        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/40 backdrop-blur-md rounded-[3rem]">
          <div onclick="doUnpause()" class="p-6 bg-[#1a2333] rounded-full shadow-2xl mb-4 border border-slate-700 cursor-pointer active:scale-90 transition-transform">
            ${I.play}
          </div>
          <h2 class="text-2xl font-black tracking-tight text-white uppercase">Game Paused</h2>
        </div>`:''}

        <div class="w-full h-full flex flex-col items-center ${paused?'paused-blur':''}">
          <div class="w-full flex justify-between items-center mb-10">
            <div onclick="exitGame()" class="opacity-50 cursor-pointer active:opacity-100">${I.back}</div>
            <div class="flex-1 bg-indigo-500/20 h-1.5 mx-4 rounded-full overflow-hidden">
              <div class="h-full bg-indigo-500 transition-all duration-300" style="width:${(gs.q/tot)*100}%"></div>
            </div>
            <div onclick="doPause()" class="p-2 rounded-full cursor-pointer active:opacity-60">${I.pause}</div>
          </div>
          <div class="w-full flex justify-between items-start mb-12">
            <span class="text-[10px] font-black opacity-50 tracking-widest uppercase">Question ${gs.q}/${tot}</span>
            <div class="relative flex items-center justify-center">
              <svg class="w-16 h-16 -rotate-90">
                <circle cx="32" cy="32" r="24" stroke="currentColor" stroke-width="4" fill="transparent" class="opacity-10"/>
                <circle id="tc" cx="32" cy="32" r="24" stroke="#ff4d4d" stroke-width="4" fill="transparent"
                  stroke-dasharray="150.8" stroke-dashoffset="${off}" stroke-linecap="round"/>
              </svg>
              <span id="tt" class="absolute text-sm font-bold tabular-nums">${timeLeft.toFixed(1)}</span>
            </div>
          </div>
          <div class="flex flex-col items-center justify-center flex-1 w-full">
            <h2 class="text-7xl font-black mb-12 tracking-tighter">${qd.a} × ${qd.b}</h2>
            <div class="relative w-full max-w-[150px] mb-8">
              <input id="gi" type="number" inputmode="numeric" value="${ans}"
                oninput="ans=this.value"
                onkeydown="if(event.key==='Enter'&&!paused&&!shaking&&ans!=='') doSubmit(parseInt(ans)===qd.ans)"
                placeholder="?"
                class="w-full bg-transparent text-center text-6xl font-black focus:outline-none ${dm?'text-white':'text-slate-800'}">
              <div class="w-full h-1 bg-indigo-500 mt-2"></div>
            </div>
            <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Press Enter to Submit</span>
          </div>
        </div>
      </div>
    </div>`;
}

// ── RESULT ─────────────────────────────────────────────────────────────────
function resultHTML() {
    const dm  = dark;
    const tot = parseInt(cfg.questions)||5;
    const acc = Math.round((gs.score/tot)*100);
    const avg = tot>0 ? (parseFloat(gs.totalTime)/tot).toFixed(1) : '0.0';
    const sc  = (color,val,label,lb,db) =>
        `<div class="p-5 rounded-[1.8rem] text-center" style="background:${dm?db:lb}">
           <span class="text-3xl font-black" style="color:${color}">${val}</span>
           <span class="text-[11px] font-bold opacity-50 uppercase tracking-widest mt-1 block ${dm?'text-slate-400':'text-slate-500'}">${label}</span>
         </div>`;
    return `
    <div class="card-wrap fade-up">
      <div class="flex flex-col items-center w-full p-6 rounded-[3rem] shadow-2xl ${dm?'bg-[#0f172a]':'bg-white'}">
        <div class="w-full flex justify-between items-center mb-6">
          <div onclick="screen='setup';paint()" class="p-2 bg-[#5b5cf2] rounded-full text-white cursor-pointer active:scale-90 transition-transform">${I.close}</div>
          <h3 class="font-bold text-sm ${dm?'text-white':'text-slate-500'}">Table Trainer</h3>
          <div onclick="dark=!dark;paint()" class="p-2 rounded-full cursor-pointer active:scale-90 transition-transform ${dm?'bg-[#1e293b] text-yellow-400':'bg-slate-800 text-white'}">${dm?I.sun:I.moon}</div>
        </div>
        <div class="text-center mb-8">
          <div class="text-5xl mb-3">🏆</div>
          <h2 class="text-4xl font-black tracking-tight ${dm?'text-white':'text-slate-800'}">Excellent!</h2>
          <p class="text-slate-400 font-bold text-sm">Session complete</p>
        </div>
        <div class="grid grid-cols-2 gap-4 w-full mb-8">
          ${sc('#818cf8',acc+'%','Accuracy','#eef2ff','#1e293b')}
          ${sc('#60a5fa',gs.score+'/'+tot,'Score','#eff6ff','#1e293b')}
          ${sc('#10b981',gs.score,'Correct','#ecfdf5','#1e293b')}
          ${sc('#ef4444',gs.wrong,'Wrong','#fef2f2','#1e293b')}
          ${sc('#a78bfa',gs.totalTime+'s','Total Time','#f5f3ff','#1e293b')}
          ${sc('#f472b6',avg+'s','Avg / Q','#fdf2f7','#1e293b')}
        </div>
        <div class="w-full mb-8 space-y-2">
          ${gs.history.map(h=>`
          <div class="flex items-center justify-between p-4 rounded-[1.2rem] border-2
            ${h.ok?(dm?'bg-emerald-900/10 border-emerald-500/20':'bg-emerald-50 border-emerald-100')
                  :(dm?'bg-rose-900/10 border-rose-500/20':'bg-rose-50 border-rose-100')}">

              <div class="${h.ok?'bg-emerald-500/10 text-emerald-500':'bg-rose-500/10 text-rose-500'} p-1.5 rounded-lg">${h.ok?I.check:I.x}</div>
              <span class="font-black text-lg ${dm?'text-white':'text-slate-800'}">${h.q}</span>
            </div>
            <div class="flex items-center gap-3">
              ${!h.ok?`<span class="text-xs font-bold flex items-center gap-1">
                <span class="text-rose-400">${h.ua==='time'?'time·'+cfg.time:h.ua}</span>
                <span class="opacity-30">→</span>
                <span class="text-emerald-500">${h.ca}</span>
              </span>`:''}
              <span class="text-xs font-bold ${dm?'text-slate-500':'text-slate-400'}">${h.t}</span>
            </div>
          </div>`).join('')}
        </div>
        <div class="flex gap-4 w-full">
          <button onclick="startGame(true)" class="flex-1 flex items-center justify-center gap-2 py-5 rounded-2xl font-black active:scale-95 transition-all ${dm?'bg-[#1e293b] text-white border border-slate-800':'bg-slate-100 text-slate-600'}">
            ${I.retry} Retry
          </button>
          <button onclick="screen='setup';paint()" class="flex-1 bg-[#5b5cf2] text-white py-5 rounded-2xl font-black shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
            New Session
          </button>
        </div>
      </div>
    </div>`;
}

// ── GAME LOGIC ─────────────────────────────────────────────────────────────
function startGame(retry=false) {
    if (!retry) {
        if (!cfg.time || !cfg.questions) return;
        if (cfg.mode==='fixed'   && !cfg.table) return;
        if (cfg.mode==='shuffle' && (!cfg.from||!cfg.to)) return;
    }
    gs = { q:1, score:0, wrong:0, history:[], totalTime:0 };
    qHistory = []; // reset question history buffer on new game
    screen = 'game';
    nextQ();
}

// ── NEXT QUESTION with History Buffer ─────────────────────────────────────
function nextQ() {
    let a, b, key;
    const maxAttempts = 60;
    let attempts = 0;

    do {
        if (cfg.mode==='fixed') {
            a = parseInt(cfg.table)||1;
        } else {
            const mn=Math.min(parseInt(cfg.from)||1, parseInt(cfg.to)||10);
            const mx=Math.max(parseInt(cfg.from)||1, parseInt(cfg.to)||10);
            a = Math.floor(Math.random()*(mx-mn+1))+mn;
        }
        b = Math.floor(Math.random()*10)+1;
        key = `${a}×${b}`;
        attempts++;
        // If we've exhausted attempts (very small question pool), just accept any
        if (attempts >= maxAttempts) break;
    } while (qHistory.includes(key));

    // Add to buffer, trim to last Q_BUF_SIZE
    qHistory.push(key);
    if (qHistory.length > Q_BUF_SIZE) qHistory.shift();

    qd = { a, b, ans: a*b };
    timeLeft = parseFloat(cfg.time)||5;
    qStart   = Date.now();
    ans      = '';
    paused   = false;
    shaking  = false;
    startTimer();
    paint();
}

function startTimer() {
    clearInterval(timer);
    timer = setInterval(()=>{
        if (paused || shaking) return;
        timeLeft = Math.round((timeLeft-0.1)*10)/10;
        if (timeLeft <= 0) {
            timeLeft = 0;
            clearInterval(timer);
            doSubmit(false, true);
            return;
        }
        const tt=document.getElementById('tt');
        const tc=document.getElementById('tc');
        if (tt) tt.innerText = timeLeft.toFixed(1);
        if (tc) {
            const lim = parseFloat(cfg.time)||5;
            tc.setAttribute('stroke-dashoffset', Math.max(0,150.8-(timeLeft/lim)*150.8));
        }
    }, 100);
}

function doSubmit(ok, timedOut=false) {
    if (shaking) return;
    if (ok) { beep(true);  advance(true,  timedOut); }
    else    { beep(false); shaking=true; paint(); setTimeout(()=>advance(false,timedOut),400); }
}

function advance(ok, timedOut) {
    const lim = parseFloat(cfg.time)||5;
    const t   = Math.min((Date.now()-qStart)/1000, lim).toFixed(1);
    gs.history.push({ q:`${qd.a} × ${qd.b}`, ok, t:t+'s', ua:timedOut?'time':(ans||'?'), ca:qd.ans });
    if (ok) gs.score++; else gs.wrong++;
    const tot = parseInt(cfg.questions)||5;
    if (gs.q >= tot) {
        gs.totalTime = gs.history.reduce((s,h)=>s+parseFloat(h.t),0).toFixed(1);
        screen = 'result';
        clearInterval(timer);
        paint();
    } else {
        gs.q++;
        nextQ();
    }
}

function doPause()   { paused=true;  clearInterval(timer); paint(); }
function doUnpause() { paused=false; paint(); startTimer(); }
function exitGame()  { screen='setup'; clearInterval(timer); paint(); }

// ── BOOT ───────────────────────────────────────────────────────────────────
paint();
initQuoteOverlay();
</script>
